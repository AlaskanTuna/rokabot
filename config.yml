# Rokabot Configuration
# Secrets (DISCORD_TOKEN, DISCORD_CLIENT_ID, GEMINI_API_KEY) stay in .env
# Environment variables can override any value below for backward compatibility.

gemini:
  model: gemini-3.1-flash-lite-preview
  timeout: 25000
  maxRetries: 3
  maxOutputTokens: 500
  baseRetryDelay: 2000
  maxLlmCalls: 4

rateLimit:
  rpm: 15
  rpd: 500

session:
  ttl: 500000
  windowSize: 20

discord:
  maxMessageLength: 1500

memory:
  bufferSize: 20
  extractionInterval: 10
  extractionGapMs: 10000
  maxFactsPerUser: 10
  factRetentionDays: 90
  channelMonitorTtlMs: 86400000

emoji:
  probability: 0.33
  cooldownMs: 180000

reminders:
  checkIntervalMs: 5000
  maxPerUser: 5
  staleThresholdMs: 300000

games:
  hangmanLives: 6
  hangmanTimeoutMs: 60000
  shiritoriTimeoutMs: 60000
  shinyChance: 0.01

statusCycleMs: 900000

timezone: Asia/Singapore

logging:
  level: info
