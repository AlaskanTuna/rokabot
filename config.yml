# Rokabot Configuration
# Secrets (DISCORD_TOKEN, DISCORD_CLIENT_ID, GEMINI_API_KEY) stay in .env
# Environment variables can override any value below for backward compatibility.

gemini:
  model: gemini-3.1-flash-lite-preview
  timeout: 25000 # ms, request timeout
  maxRetries: 1 # max retry attempts for transient errors
  maxOutputTokens: 500 # max tokens for Gemini response; set high to avoid cutoff — word count controlled via prompt.

rateLimit:
  rpm: 15 # requests per minute
  rpd: 500 # requests per day

session:
  ttl: 300000 # idle timeout in ms
  windowSize: 10 # FIFO message window size

discord:
  maxMessageLength: 1500 # Discord message char limit

# Timezone for Roka's time-of-day awareness (Layer 3 context prompt).
# Uses IANA timezone identifiers. Examples:
# Asia/Tokyo, Asia/Shanghai, America/New_York, Europe/London, UTC
# If invalid or omitted, falls back to the system's local timezone.
timezone: Asia/Singapore

logging:
  level: info # pino log level (debug/info/warn/error)
