services:
  roka:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - ADK_QUIET=1
    mem_limit: 512m
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
