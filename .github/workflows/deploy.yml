name: Deploy to Pi

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.claude/**'

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Pull latest changes
        run: cd ~/rokabot && git fetch origin main && git reset --hard origin/main

      - name: Build and restart
        run: cd ~/rokabot && docker compose up -d --build

      - name: Wait for container
        run: sleep 8

      - name: Health check
        id: health
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/ 2>/dev/null || echo '{"status":"unreachable"}')
          echo "$RESPONSE" | python3 -m json.tool
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json;print(json.load(sys.stdin).get('status','unknown'))")
          if [ "$STATUS" != "ok" ]; then
            echo "Health check failed: $STATUS"
            docker compose -f ~/rokabot/docker-compose.yml logs --tail 20
            exit 1
          fi
          echo "Health check passed"

      - name: Notify Discord (success)
        if: success() && secrets.DISCORD_WEBHOOK_URL
        run: |
          COMMIT=$(cd ~/rokabot && git log -1 --format='%h %s')
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\":\"**Deploy succeeded** \u2705\n\`$COMMIT\`\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" > /dev/null

      - name: Notify Discord (failure)
        if: failure() && secrets.DISCORD_WEBHOOK_URL
        run: |
          COMMIT=$(cd ~/rokabot && git log -1 --format='%h %s')
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\":\"**Deploy failed** \u274c\n\`$COMMIT\`\nCheck: https://github.com/AlaskanTuna/rokabot/actions\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" > /dev/null
