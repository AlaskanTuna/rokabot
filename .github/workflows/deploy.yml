name: Deploy to Pi

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.claude/**'

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Pull latest changes
        run: cd ~/rokabot && git fetch origin main && git reset --hard origin/main

      - name: Build and restart
        run: cd ~/rokabot && docker compose up -d --build

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            RESPONSE=$(curl -sf http://localhost:3000/ 2>/dev/null || echo '{"status":"unreachable"}')
            STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json;print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null)
            if [ "$STATUS" = "ok" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 10 attempts"
          docker compose -f ~/rokabot/docker-compose.yml logs --tail 20
          exit 1

      - name: Notify Discord (success)
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$WEBHOOK_URL" ] && exit 0
          COMMIT=$(cd ~/rokabot && git log -1 --format='%h %s')
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\":\"**Deploy succeeded** \u2705\n\`$COMMIT\`\"}" \
            "$WEBHOOK_URL" > /dev/null

      - name: Notify Discord (failure)
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$WEBHOOK_URL" ] && exit 0
          COMMIT=$(cd ~/rokabot && git log -1 --format='%h %s')
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\":\"**Deploy failed** \u274c\n\`$COMMIT\`\nCheck: https://github.com/AlaskanTuna/rokabot/actions\"}" \
            "$WEBHOOK_URL" > /dev/null
